<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#d125f4" />
  <meta name="description" content="Paraíso Astral — productora de música electrónica. Próximos eventos, artistas del roster y contacto." />

  <!-- Favicon -->
  <link rel="icon" href="icons/favicon.ico" sizes="16x16" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="icon" href="icons/icon-512.png" sizes="512x512" type="image/png" />

  <!-- PWA / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Paraíso Astral" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Paraíso Astral" />
  <meta property="og:title" content="Paraíso Astral — Electronic Universe" />
  <meta property="og:description" content="Productora de música electrónica. Próximos eventos, artistas del roster y contacto." />
  <meta property="og:locale" content="es_AR" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Paraíso Astral — Electronic Universe" />
  <meta name="twitter:description" content="Productora de música electrónica. Próximos eventos, artistas del roster y contacto." />

  <title>Paraíso Astral — Electronic Universe</title>

  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<div class="app">

  <!-- ════ HEADER ════ -->
  <header class="app-header">
    <div class="logo" onclick="navigate('home')" style="cursor:pointer">
      <div class="logo-icon">🌌</div>
      <div>
        <div class="logo-text">PARAÍSO ASTRAL</div>
        <div class="logo-sub">Electronic Universe</div>
      </div>
    </div>
    <div class="header-actions" style="display:flex;align-items:center;gap:0.5rem">
      <div id="header-player" style="display:none;align-items:center;gap:0.4rem">
        <div id="header-player-avatar" style="width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid var(--primary);background:linear-gradient(135deg,var(--primary),#6b1a8a);display:flex;align-items:center;justify-content:center;font-size:1rem"></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem">
          <span id="header-player-name" style="font-size:0.65rem;color:var(--primary);max-width:80px;text-align:center;overflow:hidden;white-space:nowrap;flex-shrink:0"></span>
          <input id="header-player-volume" type="range" min="0" max="1" step="0.05" value="0.5" oninput="if(window.PlayerState&&window.PlayerState.element)window.PlayerState.element.volume=this.value" style="width:60px;accent-color:var(--primary);cursor:pointer">
        </div>
        <button id="header-player-btn" onclick="togglePlay()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--primary);padding:0;line-height:1" aria-label="Play/Pause">▶</button>
      </div>
    </div>
  </header>

  <!-- ════ PAGES ════ -->

  <!-- LOGIN (admin) -->
  <div class="page" id="page-login">
    <div class="page-content fade-in">
      <div style="text-align:center;max-width:400px;margin:0 auto;padding:2rem 1rem">
        <div style="font-size:4rem;margin-bottom:1rem">🌌</div>
        <h1 style="font-family:var(--font-display);font-size:clamp(1.3rem, 7vw, 2rem);font-weight:900;margin-bottom:0.5rem;color:var(--primary);word-break:break-word">PARAÍSO ASTRAL</h1>
        <p style="color:var(--text-muted);margin-bottom:2rem">Acceso admin</p>

        <form id="login-form" style="text-align:left">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" class="input" placeholder="tu@email.com" required autocomplete="email">
          </div>

          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" class="input" placeholder="•••••••••" required autocomplete="current-password">
          </div>

          <button type="submit" class="btn btn-primary btn-full" style="margin-top:1.5rem">
            <span id="login-btn-text">🚀 Iniciar sesión</span>
            <span id="login-loading" style="display:none">🔄 Conectando...</span>
          </button>
        </form>

        <div id="login-error" style="margin-top:1rem;padding:0.75rem;background:rgba(255,0,64,0.1);border:1px solid rgba(255,0,64,0.3);border-radius:var(--radius);color:var(--pink);font-size:0.85rem;display:none"></div>

        <div style="margin-top:1.5rem">
          <button class="btn btn-ghost" style="font-size:0.78rem" onclick="navigate('home')">← Volver al sitio</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div class="page" id="page-home">
    <div class="page-content fade-in"></div>
  </div>

  <!-- EVENTS -->
  <div class="page" id="page-events">
    <div class="page-content fade-in"></div>
  </div>

  <!-- EVENT DETAIL -->
  <div class="page" id="page-event-detail">
    <div class="page-content fade-in"></div>
  </div>

  <!-- ARTISTS -->
  <div class="page" id="page-artists">
    <div class="page-content fade-in"></div>
  </div>

  <!-- ARTIST DETAIL -->
  <div class="page" id="page-artist-detail">
    <div class="page-content fade-in"></div>
  </div>

  <!-- CONTACT -->
  <div class="page" id="page-contact">
    <div class="page-content fade-in"></div>
  </div>

  <!-- ADMIN -->
  <div class="page" id="page-admin">
    <div class="page-content fade-in"></div>
  </div>

  <!-- 404 -->
  <div class="page" id="page-404">
    <div class="page-content fade-in">
      <div class="empty-state">
        <div class="empty-icon">🌌</div>
        <div class="empty-title">Página no encontrada</div>
        <div style="color: var(--text-muted); margin-top: 0.5rem;">La ruta que buscas no existe en el cosmos</div>
        <button class="btn btn-primary" style="margin-top: 1.5rem" onclick="navigate('home')">🏠 Volver al inicio</button>
      </div>
    </div>
  </div>

  <!-- ════ BOTTOM NAV ════ -->
  <!-- Admin accesible vía hash #admin o el link discreto al pie del home -->
  <nav class="bottom-nav">
    <button class="nav-item" data-nav="home" onclick="navigate('home')">
      <span class="nav-icon">🏠</span>
      <span>Inicio</span>
    </button>
    <button class="nav-item" data-nav="events" onclick="navigate('events')">
      <span class="nav-icon">📅</span>
      <span>Eventos</span>
    </button>
    <button class="nav-item nav-center" data-nav="contact" onclick="navigate('contact')">
      <div class="nav-fab">✉️</div>
    </button>
    <button class="nav-item" data-nav="artists" onclick="navigate('artists')">
      <span class="nav-icon">🎵</span>
      <span>Artistas</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ════ SCRIPTS ════ -->

<!-- Firebase SDK (Auth + Firestore) -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<!-- Env (generado por `node scripts/generate-env.js` desde .env) -->
<script>window.__ENV__ = window.__ENV__ || {};</script>
<script src="js/env.public.js"></script>

<!-- App modules -->
<script src="js/config.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/firestoreClient.js"></script>
<script src="js/cloudinaryClient.js"></script>
<script src="js/dataSource.js"></script>
<script src="js/app.js"></script>

</body>
</html>
